<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MZEC Network GIS</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:#0a0e14}
#map{width:100%;height:100%}

/* Loader */
#loader{position:fixed;inset:0;z-index:9999;background:#0a0e14;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
#loader.done{opacity:0;pointer-events:none}
#loader h1{color:#00d4ff;font-size:22px;font-weight:800;margin-bottom:16px;letter-spacing:-0.5px}
#loader .bar{width:220px;height:4px;background:#1a2030;border-radius:2px;overflow:hidden}
#loader .fill{height:100%;background:linear-gradient(90deg,#00d4ff,#b86eff);transition:width .3s;border-radius:2px}
#loader .msg{color:#556;font-size:12px;margin-top:10px}

/* Top bar */
#topbar{position:fixed;top:0;left:0;right:0;z-index:500;height:36px;background:rgba(10,14,20,.92);backdrop-filter:blur(10px);
  display:flex;align-items:center;padding:0 10px;gap:8px;font-size:11px;color:#778;border-bottom:1px solid #1a2030}
#topbar .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
#topbar .legend{display:flex;gap:10px;flex-wrap:wrap;overflow:hidden;flex:1}
#topbar .legend span{white-space:nowrap}
#zoomLvl{color:#00d4ff;font-weight:700;margin-left:auto;flex-shrink:0}

/* Side panel */
#panel{position:fixed;top:36px;left:0;bottom:0;width:280px;z-index:600;background:rgba(10,14,20,.97);
  backdrop-filter:blur(14px);transform:translateX(-100%);transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;border-right:1px solid #1a2030}
#panel.open{transform:translateX(0)}
.sec{padding:12px 14px 6px;color:#445;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.lyr{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #111820;cursor:pointer;transition:background .15s}
.lyr:active{background:#1a2030}
.lyr .ld{width:14px;height:14px;border-radius:4px;margin-right:10px;flex-shrink:0;transition:opacity .2s}
.lyr .ln{color:#bbc;font-size:13px;flex:1}
.lyr .lz{color:#445;font-size:10px}
.lyr.off .ld{opacity:.15}
.lyr.off .ln{color:#445;text-decoration:line-through}

/* Basemap selector in panel */
.bm{display:flex;gap:6px;padding:10px 14px}
.bm button{flex:1;padding:8px 4px;border:1px solid #2a3040;border-radius:8px;background:#0d1117;color:#778;font-size:11px;cursor:pointer;transition:all .2s;font-weight:600}
.bm button.active{border-color:#00d4ff;color:#00d4ff;background:#00d4ff12}
.bm button:active{transform:scale(.95)}

/* Coord goto in panel */
.coord-section{padding:8px 14px}
.coord-section input{width:100%;padding:8px 10px;border:1px solid #2a3040;border-radius:6px;background:#0d1117;color:#eef;font-size:13px;outline:none;font-family:monospace}
.coord-section input:focus{border-color:#00d4ff}
.coord-section .hint{color:#445;font-size:10px;margin-top:4px}
.coord-section button{margin-top:6px;width:100%;padding:8px;border:none;border-radius:6px;background:#00d4ff;color:#0a0e14;font-weight:700;font-size:12px;cursor:pointer}

/* Search overlay */
#searchWrap{position:fixed;top:36px;left:0;right:0;z-index:700;display:none;padding:8px;background:rgba(10,14,20,.97);backdrop-filter:blur(10px)}
#searchWrap.open{display:flex;gap:6px}
#searchWrap input{flex:1;padding:10px 14px;border:1px solid #2a3040;border-radius:8px;background:#0d1117;color:#eef;font-size:14px;outline:none}
#searchWrap input:focus{border-color:#00d4ff}
#searchWrap button{padding:10px 14px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.sb{background:#00d4ff;color:#0a0e14}
.cb{background:#1a2030;color:#778}

/* FABs */
.fab{position:fixed;bottom:24px;z-index:500;width:50px;height:50px;border-radius:50%;border:none;
  font-size:20px;cursor:pointer;box-shadow:0 3px 16px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
  background:#1a2030;color:#aab;transition:all .15s;-webkit-tap-highlight-color:transparent}
.fab:active,.fab.active{background:#00d4ff;color:#0a0e14;transform:scale(.92)}
#btnMenu{left:16px}
#btnGps{left:78px}
#btnSearch{left:140px}
#btnSat{right:16px}

/* Popup */
.maplibregl-popup-content{background:#0d1117!important;color:#ccd;border:1px solid #2a3040;border-radius:12px!important;
  padding:0!important;max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.6)!important}
.maplibregl-popup-close-button{color:#778;font-size:20px;padding:6px 10px;right:0;top:0}
.maplibregl-popup-tip{border-top-color:#2a3040!important}
.ph{padding:10px 14px;font-size:14px;font-weight:800;border-bottom:1px solid #2a3040;display:flex;align-items:center;gap:8px}
.ph .pi{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.pr{display:flex;justify-content:space-between;padding:5px 14px;font-size:11px;border-bottom:1px solid #0d1820}
.pr:nth-child(odd){background:rgba(255,255,255,.015)}
.pk{color:#556;flex-shrink:0;margin-right:10px;min-width:80px}
.pv{color:#dde;text-align:right;word-break:break-all;font-weight:500}
.pr.hi .pv{color:#00d4ff;font-weight:700}
.pr.hi .pk{color:#00d4ff80}
.pcrd{padding:6px 14px 10px;font-size:10px;color:#445;border-top:1px solid #1a2030;font-family:monospace;cursor:pointer}
.pcrd:active{color:#00d4ff}
</style>
</head>
<body>

<div id="loader"><h1>MZEC Network GIS</h1><div class="bar"><div class="fill" id="lf"></div></div><div class="msg" id="lm">Initializing map engine...</div></div>

<div id="topbar">
  <div class="legend" id="legend"></div>
  <span id="zoomLvl">z7</span>
</div>

<div id="panel">
  <div class="sec">Basemap</div>
  <div class="bm">
    <button id="bmDark" class="active" onclick="setBase('dark')">Dark</button>
    <button id="bmLight" onclick="setBase('light')">Light</button>
    <button id="bmSat" onclick="setBase('sat')">Satellite</button>
  </div>

  <div class="sec">Go to Coordinates</div>
  <div class="coord-section">
    <input type="text" id="coordInput" placeholder="23.5880, 56.7234" />
    <div class="hint">Lat, Lon or Lon, Lat (auto-detected)</div>
    <button onclick="gotoCoord()">Go to Location</button>
  </div>

  <div class="sec">Network Layers</div>
  <div id="layerList"></div>
</div>

<div id="searchWrap">
  <input type="text" id="si" placeholder="Search DSS, feeder, pole, district..." />
  <button class="sb" onclick="doSearch()">Go</button>
  <button class="cb" onclick="toggleSearch()">✕</button>
</div>

<button class="fab" id="btnMenu" onclick="togglePanel()">☰</button>
<button class="fab" id="btnGps" onclick="locateMe()">◎</button>
<button class="fab" id="btnSearch" onclick="toggleSearch()">⌕</button>
<button class="fab" id="btnSat" onclick="cycleSat()">🌐</button>

<div id="map"></div>

<script>
// ========== LAYER CONFIG ==========
const TILE_URL = 'tiles/{z}/{x}/{y}.pbf';

const LAYERS = [
  {id:'substation_boundary',name:'Substation',type:'polygon',color:'#b86eff',minzoom:6},
  {id:'hv_oh_line',name:'HV OH Line',type:'line',color:'#00d4ff',dash:null,minzoom:8,width:[8,1.5,12,2.5,15,4,18,7]},
  {id:'hv_ug_line',name:'HV UG Line',type:'line',color:'#ff8c42',dash:[4,2],minzoom:8,width:[8,1.5,12,2.5,15,4,18,7]},
  {id:'lv_oh_line',name:'LV OH Line',type:'line',color:'#4CAF50',dash:null,minzoom:12,width:[12,1,14,2,16,3,18,5]},
  {id:'lv_ug_line',name:'LV UG Line',type:'line',color:'#8BC34A',dash:[4,2],minzoom:12,width:[12,1,14,2,16,3,18,5]},
  {id:'pole_structure',name:'Pole',type:'point',color:'#42a5f5',minzoom:13},
  {id:'transformer',name:'Transformer',type:'point',color:'#ff8c42',minzoom:10,radius:[10,4,13,6,15,10,18,14]},
  {id:'switch_hv',name:'Switch HV (ABS)',type:'point',color:'#ffd84d',minzoom:11,radius:[11,3,13,5,15,9,18,13]},
  {id:'switch',name:'Switch LV',type:'point',color:'#ce93d8',minzoom:13},
];

const PRIORITY = ['TRANSNUMBER','FEEDERID','FEEDERID2','FEEDERINFO','FACILITYID','POLENUMBER',
  'SUBSTATIONNAME','SUBSTATIONCODE','RATEDKVA','VOLTAGE','GOVERNORATE','DISTRICT',
  'SWITCHTYPE','NORMALPOSITION','MATERIAL','HEIGHT','STATUS','CIRCUITID','CONDUCTORSIZE',
  'CONDUCTORMATERIAL','EAMASSETNUMBER','EAMAREA','SUBNUMBER'];

// ========== BASEMAPS ==========
const BASES = {
  dark:  'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
  light: 'https://basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png',
  sat:   'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
};
let curBase = 'dark';

// ========== MAP ==========
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      basemap: { type: 'raster', tiles: [BASES.dark], tileSize: 256, attribution: '© OSM © CARTO © Esri' }
    },
    layers: [{ id: 'base', type: 'raster', source: 'basemap' }]
  },
  center: [56.5, 23.5],
  zoom: 7,
  maxZoom: 19,
  attributionControl: false
});
map.addControl(new maplibregl.AttributionControl({compact:true}), 'bottom-right');
map.addControl(new maplibregl.ScaleControl({maxWidth:120}), 'bottom-left');

// Zoom display
map.on('zoom', () => { document.getElementById('zoomLvl').textContent = 'z' + map.getZoom().toFixed(1); });

function ld(msg, pct) {
  document.getElementById('lf').style.width = pct + '%';
  document.getElementById('lm').textContent = msg;
}

// ========== BASEMAP SWITCH ==========
function setBase(key) {
  curBase = key;
  map.getSource('basemap').setTiles([BASES[key]]);
  document.querySelectorAll('.bm button').forEach(b => b.classList.remove('active'));
  document.getElementById('bm' + key.charAt(0).toUpperCase() + key.slice(1)).classList.add('active');
  document.getElementById('btnSat').classList.toggle('active', key === 'sat');
}

let satCycle = ['dark','sat'];
let satIdx = 0;
function cycleSat() {
  satIdx = (satIdx + 1) % satCycle.length;
  setBase(satCycle[satIdx]);
}

// ========== VISIBILITY ==========
const vis = {};
LAYERS.forEach(l => vis[l.id] = true);

// ========== ADD LAYERS ON LOAD ==========
// Use both load and idle events - whichever fires first
var _initialized = false;
function initLayers() {
  if (_initialized) return;
  _initialized = true;
  ld('Loading vector tiles...', 30);

  const baseUrl = window.location.href.replace(/\/[^\/]*$/, '/');
  map.addSource('mzec', {
    type: 'vector',
    tiles: [baseUrl + TILE_URL],
    minzoom: 6,
    maxzoom: 16,
  });

  ld('Rendering layers...', 60);

  for (const c of LAYERS) {
    if (c.type === 'point') {
      const r = c.radius || [12,3,14,5,16,8,18,12];
      map.addLayer({
        id: c.id, type: 'circle', source: 'mzec', 'source-layer': c.id, minzoom: c.minzoom,
        paint: {
          'circle-color': c.color,
          'circle-radius': ['interpolate',['linear'],['zoom'],...r],
          'circle-stroke-width': ['interpolate',['linear'],['zoom'],10,1,16,2],
          'circle-stroke-color': curBase === 'dark' ? '#0a0e14' : '#fff',
          'circle-opacity': 0.92
        }
      });
    } else if (c.type === 'line') {
      const w = c.width || [8,1,12,2,15,3.5,18,6];
      var linePaint = {
          'line-color': c.color,
          'line-width': ['interpolate',['linear'],['zoom'],...w],
          'line-opacity': 0.8
        };
      if (c.dash) linePaint['line-dasharray'] = c.dash;
      map.addLayer({
        id: c.id, type: 'line', source: 'mzec', 'source-layer': c.id, minzoom: c.minzoom,
        paint: linePaint
      });
      // Invisible wider hitbox layer for easier clicking
      map.addLayer({
        id: c.id + '-hit', type: 'line', source: 'mzec', 'source-layer': c.id, minzoom: c.minzoom,
        paint: { 'line-color': 'transparent', 'line-width': 16, 'line-opacity': 0 }
      });
    } else if (c.type === 'polygon') {
      map.addLayer({
        id: c.id + '-fill', type: 'fill', source: 'mzec', 'source-layer': c.id, minzoom: c.minzoom,
        paint: { 'fill-color': c.color, 'fill-opacity': 0.08 }
      });
      map.addLayer({
        id: c.id + '-outline', type: 'line', source: 'mzec', 'source-layer': c.id, minzoom: c.minzoom,
        paint: { 'line-color': c.color, 'line-width': 2, 'line-opacity': 0.6 }
      });
    }
  }

  // Click handlers for ALL layer types
  for (const c of LAYERS) {
    // Determine clickable layer ID
    let clickIds;
    if (c.type === 'polygon') clickIds = [c.id + '-fill'];
    else if (c.type === 'line') clickIds = [c.id + '-hit', c.id]; // hit area + actual line
    else clickIds = [c.id];

    for (const lid of clickIds) {
      map.on('click', lid, e => {
        if (!e.features || !e.features.length) return;
        e.preventDefault && e.preventDefault();
        const f = e.features[0];
        const p = f.properties;

        let html = '<div class="ph"><div class="pi" style="background:'+c.color+'"></div>'+c.name+'</div>';
        const shown = {};
        for (const k of PRIORITY) {
          if (p[k] != null && p[k] !== '') {
            html += '<div class="pr hi"><span class="pk">'+k+'</span><span class="pv">'+p[k]+'</span></div>';
            shown[k] = true;
          }
        }
        for (const [k,v] of Object.entries(p)) {
          if (!shown[k] && v != null && v !== '') {
            html += '<div class="pr"><span class="pk">'+k+'</span><span class="pv">'+v+'</span></div>';
          }
        }

        // Show coordinates
        const ll = e.lngLat;
        html += '<div class="pcrd" onclick="navigator.clipboard.writeText(this.textContent).then(()=>this.style.color=\'#00d4ff\')">'+ll.lat.toFixed(6)+', '+ll.lng.toFixed(6)+'</div>';

        new maplibregl.Popup({maxWidth:'300px',offset:8}).setLngLat(ll).setHTML(html).addTo(map);
      });

      map.on('mouseenter', lid, () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', lid, () => { map.getCanvas().style.cursor = ''; });
    }
  }

  buildUI();
  ld('Ready!', 100);
  setTimeout(() => {
    const el = document.getElementById('loader');
    el.classList.add('done');
    setTimeout(() => el.style.display = 'none', 700);
  }, 400);
}
map.on('load', initLayers);
// Fallback: if load doesn't fire within 5s, force init
setTimeout(() => { if (!_initialized && map) initLayers(); }, 5000);

// ========== UI BUILDERS ==========
function buildUI() {
  let legend = '';
  for (const c of LAYERS) {
    legend += '<span><span class="dot" style="background:'+c.color+'"></span>'+c.name+'</span>';
  }
  document.getElementById('legend').innerHTML = legend;

  let html = '';
  for (const c of LAYERS) {
    html += '<div class="lyr" id="li-'+c.id+'" onclick="toggleLayer(\''+c.id+'\')">' +
      '<div class="ld" style="background:'+c.color+'"></div>' +
      '<div class="ln">'+c.name+'</div>' +
      '<div class="lz">z'+c.minzoom+'+</div></div>';
  }
  document.getElementById('layerList').innerHTML = html;
}

function toggleLayer(id) {
  vis[id] = !vis[id];
  document.getElementById('li-'+id).classList.toggle('off', !vis[id]);
  const c = LAYERS.find(l => l.id === id);
  const v = vis[id] ? 'visible' : 'none';
  if (c.type === 'polygon') {
    map.setLayoutProperty(id+'-fill','visibility',v);
    map.setLayoutProperty(id+'-outline','visibility',v);
  } else if (c.type === 'line') {
    map.setLayoutProperty(id,'visibility',v);
    map.setLayoutProperty(id+'-hit','visibility',v);
  } else {
    map.setLayoutProperty(id,'visibility',v);
  }
}

// ========== PANEL ==========
let panelOpen = false;
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('panel').classList.toggle('open', panelOpen);
  document.getElementById('btnMenu').classList.toggle('active', panelOpen);
}

// ========== LIVE GPS TRACKING ==========
let gpsMarker = null;
let gpsCircle = null;
let gpsWatchId = null;
let gpsTracking = false;
let gpsFirstFix = true;

function locateMe() {
  if (gpsTracking) {
    // Toggle off - stop tracking
    stopTracking();
    return;
  }

  // Start live tracking
  gpsTracking = true;
  gpsFirstFix = true;
  document.getElementById('btnGps').classList.add('active');

  if (!navigator.geolocation) { alert('GPS not supported'); stopTracking(); return; }

  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      const ll = [pos.coords.longitude, pos.coords.latitude];
      const acc = pos.coords.accuracy; // meters

      // Create or move marker
      if (!gpsMarker) {
        const el = document.createElement('div');
        el.innerHTML = '<div class="gps-dot"></div><div class="gps-ring"></div>';
        gpsMarker = new maplibregl.Marker({ element: el }).setLngLat(ll).addTo(map);
      } else {
        gpsMarker.setLngLat(ll);
      }

      // Accuracy circle
      const circleGeoJSON = createCircle(ll, acc);
      if (map.getSource('gps-accuracy')) {
        map.getSource('gps-accuracy').setData(circleGeoJSON);
      } else {
        map.addSource('gps-accuracy', { type: 'geojson', data: circleGeoJSON });
        map.addLayer({
          id: 'gps-accuracy-fill', type: 'fill', source: 'gps-accuracy',
          paint: { 'fill-color': '#00d4ff', 'fill-opacity': 0.08 }
        });
        map.addLayer({
          id: 'gps-accuracy-line', type: 'line', source: 'gps-accuracy',
          paint: { 'line-color': '#00d4ff', 'line-width': 1.5, 'line-opacity': 0.3 }
        });
      }

      // Auto-center on first fix
      if (gpsFirstFix) {
        map.flyTo({ center: ll, zoom: 17, duration: 1500 });
        gpsFirstFix = false;
      }
    },
    err => {
      alert('GPS error: ' + err.message);
      stopTracking();
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 2000 }
  );
}

function stopTracking() {
  gpsTracking = false;
  document.getElementById('btnGps').classList.remove('active');
  if (gpsWatchId !== null) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  if (gpsMarker) { gpsMarker.remove(); gpsMarker = null; }
  if (map.getLayer('gps-accuracy-fill')) map.removeLayer('gps-accuracy-fill');
  if (map.getLayer('gps-accuracy-line')) map.removeLayer('gps-accuracy-line');
  if (map.getSource('gps-accuracy')) map.removeSource('gps-accuracy');
}

// Generate a GeoJSON circle polygon
function createCircle(center, radiusM, steps) {
  steps = steps || 48;
  const coords = [];
  const km = radiusM / 1000;
  for (let i = 0; i <= steps; i++) {
    const angle = (i / steps) * 2 * Math.PI;
    const dx = km * Math.cos(angle) / (111.32 * Math.cos(center[1] * Math.PI / 180));
    const dy = km * Math.sin(angle) / 110.574;
    coords.push([center[0] + dx, center[1] + dy]);
  }
  return { type: 'Feature', geometry: { type: 'Polygon', coordinates: [coords] } };
}

// ========== COORDINATE GOTO ==========
function gotoCoord() {
  const raw = document.getElementById('coordInput').value.trim();
  if (!raw) return;

  // Parse various formats: "23.58, 56.72" or "56.72, 23.58" or "23.58 56.72" or Google Maps link
  let lat, lon;

  // Try Google Maps URL extraction
  const gmatch = raw.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (gmatch) { lat = parseFloat(gmatch[1]); lon = parseFloat(gmatch[2]); }

  if (!lat) {
    // Split by comma, space, or tab
    const parts = raw.split(/[,\s\t]+/).map(Number).filter(n => !isNaN(n));
    if (parts.length >= 2) {
      // Auto-detect: Oman is lat 16-27, lon 51-60
      if (parts[0] >= 15 && parts[0] <= 28 && parts[1] >= 50 && parts[1] <= 62) {
        lat = parts[0]; lon = parts[1]; // lat, lon order
      } else if (parts[1] >= 15 && parts[1] <= 28 && parts[0] >= 50 && parts[0] <= 62) {
        lat = parts[1]; lon = parts[0]; // lon, lat order
      } else {
        // Generic: assume first is lat if < 90
        if (Math.abs(parts[0]) <= 90) { lat = parts[0]; lon = parts[1]; }
        else { lat = parts[1]; lon = parts[0]; }
      }
    }
  }

  if (lat && lon && !isNaN(lat) && !isNaN(lon)) {
    map.flyTo({ center: [lon, lat], zoom: 17, duration: 1500 });
    // Add a temporary marker
    const el = document.createElement('div');
    el.style.cssText = 'width:16px;height:16px;border-radius:50%;background:#ff4444;border:3px solid white;box-shadow:0 0 8px #ff444480';
    new maplibregl.Marker({element:el}).setLngLat([lon, lat]).addTo(map);
    togglePanel(); // close panel
  } else {
    alert('Could not parse coordinates. Try: 23.5880, 56.7234');
  }
}
document.getElementById('coordInput').addEventListener('keydown', e => { if (e.key === 'Enter') gotoCoord(); });

// ========== SEARCH ==========
let searchOpen = false;
function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('searchWrap').classList.toggle('open', searchOpen);
  document.getElementById('btnSearch').classList.toggle('active', searchOpen);
  if (searchOpen) document.getElementById('si').focus();
  else document.getElementById('si').value = '';
}
document.getElementById('si').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function doSearch() {
  const q = document.getElementById('si').value.trim();
  if (!q) return;

  // Check if it looks like coordinates first
  const parts = q.split(/[,\s]+/).map(Number);
  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1]) && Math.abs(parts[0]) > 1 && Math.abs(parts[1]) > 1) {
    document.getElementById('coordInput').value = q;
    gotoCoord();
    toggleSearch();
    return;
  }

  // Search rendered features
  const allLayers = [];
  for (const c of LAYERS) {
    if (c.type === 'polygon') allLayers.push(c.id + '-fill');
    else allLayers.push(c.id);
  }

  let results = [];
  try {
    const features = map.queryRenderedFeatures({ layers: allLayers.filter(l => { try { map.getLayer(l); return true; } catch(e) { return false; }}) });
    for (const f of features) {
      for (const [k, v] of Object.entries(f.properties)) {
        if (String(v).toUpperCase().includes(q.toUpperCase())) {
          results.push(f);
          break;
        }
      }
      if (results.length >= 100) break;
    }
  } catch(e) { console.warn('Search error:', e); }

  if (results.length > 0) {
    const f = results[0];
    const geom = f.geometry;
    let center;
    if (geom.type === 'Point') center = geom.coordinates;
    else if (geom.type === 'LineString') {
      const mid = Math.floor(geom.coordinates.length / 2);
      center = geom.coordinates[mid];
    } else if (geom.type === 'MultiLineString') center = geom.coordinates[0][0];
    else if (geom.type === 'Polygon') center = geom.coordinates[0][0];
    else center = [56.5, 23.5];

    map.flyTo({ center: center, zoom: Math.max(map.getZoom(), 15), duration: 1000 });
    toggleSearch();
  } else {
    alert('No matching features in current view (zoom in for more detail)');
  }
}

// ========== GPS + PULSE STYLES ==========
const style = document.createElement('style');
style.textContent = '@keyframes pulse{0%,100%{box-shadow:0 0 8px #00d4ff80}50%{box-shadow:0 0 24px #00d4ffcc,0 0 48px #00d4ff40}}' +
  '@keyframes gps-pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(3);opacity:0}}' +
  '.gps-dot{width:16px;height:16px;border-radius:50%;background:#00d4ff;border:3px solid white;box-shadow:0 0 8px #00d4ff80;position:relative;z-index:2}' +
  '.gps-ring{width:16px;height:16px;border-radius:50%;border:2px solid #00d4ff;position:absolute;top:0;left:0;animation:gps-pulse 2s ease-out infinite;z-index:1}';
document.head.appendChild(style);
</script>
